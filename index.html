<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseHub</title>
</head>
<body>
    
    <header class="header">
        <h1>ExpenseHub</h1>
    </header>

    <main>
        <section class="financial-summary">

            <div class="summary-cards">
                <div class="summary-card">
                    <h3>Current Balance</h3>
                    <p>0</p>
                </div>

                <div class="summary-card">
                    <h3>Total Income</h3>
                    <p>0</p>
                </div>

                <div class="summary-card">
                    <h3>Total Expense</h3>
                    <p>0</p>
                </div>

            </div>
            

        </section>

        <section class="add-transaction">

            <h2>Add Transaction</h2>

            <form id="transactionForm">

                <div class="form-group">
                    <label for="transactionName">Transaction Name</label>
                    <input type="text" id="transactionName" placeholder="Enter your Transaction Name">
                </div>

                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter an Amount">
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date">
                </div>

                <div class="form-group">

                    <label for="category">Category</label>

                    <select  id="category">
                        <option value="">Select Category</option>
                        <option value="food">Food</option>
                        <option value="transportation">Transportation</option>
                        <option value="shopping">Shopping</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="salary">Salary</option>
                        <option value="bills">Bills</option>
                        <option value="other">Other</option>
                        
                    </select>

                </div>

                <div class="form-group">

                    <label for="type">Type</label>

                    <select id="type">
                        <option value="">Select Type</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>

                </div>

                <button id="addTransaction" type="submit">Add Transaction</button>
 
            </form>

        </section>

        <section class="search-filter">

            <h2>Find Transactions</h2>

            <input type="text" id="searchTransaction" placeholder="Search Transaction Name">

            <select id="categoryFilter">
                <option value="All Category">All Category</option>
                <option value="food">Food</option>
                <option value="transportation">Transportation</option>
                <option value="shopping">Shopping</option>
                <option value="healthcare">Healthcare</option>
                <option value="salary">Salary</option>
                <option value="bills">Bills</option>
                <option value="other">Other</option>
            </select>


            <input type="date" id="transactionDate">

            <select  id="typeFilter">
                <option value="All Type">All Type</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

        </section>

        <section class="transaction-list">

            <h2>Transaction List</h2>

            <div class="empty-state">
                <h3>No transactions found.</h3>
                <p>Add your first transaction to get started.</p>
            </div>

            <div class="transaction-container">

                <div class="transaction-card">

                    <div class="transaction-details">

                        <h3 class="transaction-title">Food</h3>

                        <p class="transaction-amount">Amount: 400</p>

                        <p class="transaction-date">Date: 26 June 2026</p>

                        <p class="transaction-category">Category: Food</p>

                        <p class="transaction-type">Type: Expense</p>

                    </div>

                    <div class="transaction-actions">
                        
                        <button class="edit-btn">Edit</button>

                        <button class="delete-btn">Delete</button>

                    </div>
                </div>

                
            </div>

        </section>
    </main>
</body>
</html>
